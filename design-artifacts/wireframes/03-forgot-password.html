<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe — Forgot password</title>
<link rel="stylesheet" href="_wireframe.css">
</head>
<body>
<div class="wf-toolbar"><strong>WIREFRAME</strong><span class="tag">auth</span><span>03 · Forgot password (forgot-password.page.vue)</span><a href="index.html">← index</a></div>
<div class="wf-canvas">
    <div class="wf-screen" style="display:grid; grid-template-columns:1fr 1fr; min-height:560px;">
        <!-- AuthImageComponent (illustration panel) -->
        <div class="wf-img" style="border:none; border-right:2px solid var(--wf-line);"><span>Illustration / brand image</span></div>
        <!-- ForgotPasswordComponent -->
        <div style="padding:64px 56px; display:flex; flex-direction:column; justify-content:center; gap:18px;">
            <div class="wf-logo" style="width:34px; height:34px;"></div>
            <div class="wf-lines"><div class="wf-line w-70" style="height:22px;"></div><div class="wf-line sm w-90"></div><div class="wf-line sm w-60"></div></div>
            <div class="wf-field"><span class="wf-label">Email</span><div class="wf-input">name@example.com</div></div>
            <div class="wf-btn primary block">Send reset link</div>
            <div style="text-align:center;"><span class="wf-line sm" style="width:140px; display:inline-block;"></span></div>
            <span class="wf-callout">After sending: shows a confirmation state "check your email"</span>
        </div>
    </div>
</div>
</body>
</html>
