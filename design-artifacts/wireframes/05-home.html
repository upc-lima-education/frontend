<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe — Home</title>
<link rel="stylesheet" href="_wireframe.css">
</head>
<body>
<div class="wf-toolbar"><strong>WIREFRAME</strong><span class="tag">public</span><span>05 · Home / Welcome (home.page.vue)</span><a href="index.html">← index</a></div>
<div class="wf-canvas">
    <div class="wf-screen">
        <!-- navbar -->
        <div class="wf-nav">
            <div class="logo"><div class="mark"></div><div class="wf-line" style="width:70px;"></div></div>
            <div class="nav-links"><span class="active">News</span><span>Messages</span></div>
            <div class="actions"><div class="icon">🔔</div><div class="cta">Find a job</div><div class="avatar"></div></div>
        </div>
        <div class="wf-body">
            <!-- PageHeader -->
            <div style="border-bottom:2px solid var(--wf-line-soft); padding-bottom:14px; margin-bottom:24px;"><div class="wf-line" style="width:160px; height:20px;"></div></div>
            <!-- welcome -->
            <div class="wf-lines" style="margin-bottom:28px;"><div class="wf-line" style="width:240px; height:26px;"></div><div class="wf-line sm w-30"></div></div>
            <!-- 3 quick-link cards -->
            <div class="wf-grid" style="grid-template-columns:repeat(3,1fr);">
                <div class="wf-card"><div class="wf-line" style="width:120px; height:16px; margin-bottom:10px;"></div><div class="wf-line sm w-80"></div></div>
                <div class="wf-card"><div class="wf-line" style="width:120px; height:16px; margin-bottom:10px;"></div><div class="wf-line sm w-70"></div></div>
                <div class="wf-card"><div class="wf-line" style="width:120px; height:16px; margin-bottom:10px;"></div><div class="wf-line sm w-60"></div></div>
            </div>
            <span class="wf-callout" style="display:block; margin-top:18px;">Cards link to: News · Jobs · Settings (auto-fit grid, 1 col on mobile)</span>
        </div>
    </div>
</div>
</body>
</html>
