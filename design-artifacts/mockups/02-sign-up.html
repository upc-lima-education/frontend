<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup — Sign up</title>
<link rel="stylesheet" href="_app.css">
<style>
.stage { min-height: calc(100vh - 41px); display:grid; place-items:center; padding:40px 16px;
    background: radial-gradient(80% 60% at 50% -10%, rgba(30,61,173,.10) 0%, transparent 60%), linear-gradient(180deg,#eef2f8,#e6eaf3); }
.auth-card { width:880px; max-width:100%; display:grid; grid-template-columns:1.05fr 1fr; background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 30px 70px -24px rgba(12,22,57,.45); }
.brand-panel { padding:44px 40px; color:#fff; display:flex; flex-direction:column; gap:24px;
    background: radial-gradient(110% 80% at 100% 0%, var(--color-primary) 0%, transparent 55%), linear-gradient(165deg, var(--color-primary-dark) 0%, #0C1145 100%); }
.brand-panel .eyebrow { font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--color-lavender); font-weight:600; }
.brand-panel h2 { font-size:var(--fs-title); margin:10px 0 8px; line-height:1.12; }
.brand-panel p { margin:0; color:rgba(255,255,255,.72); line-height:1.5; max-width:32ch; }
.spine { margin-top:auto; display:flex; flex-direction:column; gap:12px; }
.chip { font-size:14px; padding:7px 12px; border-radius:999px; width:fit-content; border:1px solid rgba(184,192,232,.45); background:rgba(184,192,232,.14); }
.chip.org { margin-left:auto; color:var(--color-lavender); border-color:rgba(255,255,255,.22); background:rgba(255,255,255,.03); }
.form-panel { padding:40px 36px; display:flex; flex-direction:column; gap:14px; }
.welcome { font-size:28px; font-weight:600; color:#0C1145; margin:4px 0 0; }
.role-toggle { display:flex; gap:6px; padding:5px; background:var(--color-bg); border:1px solid var(--color-border); border-radius:8px; }
.role-toggle button { flex:1; padding:10px; border:none; border-radius:6px; background:transparent; font-family:var(--font-family); font-weight:600; font-size:14px; color:var(--color-text-secondary); cursor:pointer; }
.role-toggle button.on { background:var(--color-accent); color:#fff; }
.gbtn { display:flex; align-items:center; justify-content:center; gap:10px; height:44px; border:1px solid var(--color-border); border-radius:8px; background:#fff; font-weight:600; color:var(--color-text-secondary); }
.divider-or { display:flex; align-items:center; gap:12px; color:var(--color-text-muted); font-size:13px; }
.divider-or::before,.divider-or::after { content:""; flex:1; height:1px; background:var(--color-border); }
.two { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.f label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
.f input { width:100%; padding:11px 14px; border:1px solid var(--color-border); border-radius:10px; background:#F7F7F7; font-family:var(--font-family); font-size:15px; }
.submit { margin-top:4px; height:48px; border:none; border-radius:10px; background:var(--color-primary); color:#fff; font-weight:600; font-size:16px; cursor:pointer; }
.foot { text-align:center; font-size:14px; color:var(--color-text-secondary); }
.foot button { background:none; border:none; color:var(--color-primary); font-weight:600; cursor:pointer; }
@media(max-width:860px){ .auth-card{grid-template-columns:1fr;max-width:440px;} .spine{display:none;} }
</style>
</head>
<body>
<div class="mk-toolbar"><strong>MOCKUP</strong><span class="tag">auth</span><span>02 · Sign up</span><a href="index.html">← index</a></div>
<div class="stage">
    <div class="auth-card">
        <aside class="brand-panel">
            <div style="display:flex;align-items:center;gap:8px;"><div class="brand-logo" style="filter:brightness(0) invert(1)"></div><strong style="font-size:20px;">Llanqui</strong></div>
            <div><span class="eyebrow">— Join today</span><h2>Create your account in minutes</h2><p>Workers and companies, all in one place.</p></div>
            <div class="spine"><span class="chip">Driver</span><span class="chip org">Construction</span></div>
        </aside>
        <section class="form-panel">
            <h1 class="welcome">Create your account</h1>
            <div class="role-toggle"><button class="on">I'm a Worker</button><button>I'm a Company</button></div>
            <div class="gbtn">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.8-6.8C35.6 2.4 30.1 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-2.8-.4-4.1H24v7.8h12.4c-.3 2.1-1.6 5.2-4.6 7.3l7.1 5.5c4.3-3.9 6.8-9.8 6.8-16.5z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.4-.8-3-.8-4.6s.3-3.2.8-4.6l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.1-5.5c-2 1.4-4.6 2.3-8.8 2.3-6.3 0-11.7-3.7-13.6-9.4l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
                Sign up with Google
            </div>
            <div class="divider-or">or</div>
            <div class="two">
                <div class="f"><label>First name</label><input placeholder="John"></div>
                <div class="f"><label>Last name</label><input placeholder="Doe"></div>
            </div>
            <div class="f"><label>Email</label><input type="email" placeholder="name@example.com"></div>
            <div class="f"><label>Password</label><input type="password" placeholder="••••••••"></div>
            <button class="submit">Create account</button>
            <p class="foot">Already have an account? <button>Sign in</button></p>
        </section>
    </div>
</div>
</body>
</html>
