<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup — Forgot password</title>
<link rel="stylesheet" href="_app.css">
<style>
.split { display:grid; grid-template-columns:1fr 1fr; min-height:calc(100vh - 41px); }
.illus { color:#fff; display:flex; flex-direction:column; justify-content:flex-end; gap:12px; padding:48px;
    background: radial-gradient(110% 80% at 100% 0%, var(--color-primary) 0%, transparent 55%), linear-gradient(165deg, var(--color-primary-dark) 0%, #0C1145 100%); }
.illus h2 { font-size:var(--fs-title); margin:0; line-height:1.15; }
.illus p { margin:0; color:rgba(255,255,255,.72); max-width:34ch; }
.panel { display:flex; flex-direction:column; justify-content:center; gap:18px; padding:64px 56px; background:#fff; }
.panel .logo { width:36px; height:36px; border-radius:8px; background:linear-gradient(135deg,var(--color-primary),var(--color-accent)); }
.panel h1 { font-size:26px; margin:0; }
.panel .lead { color:var(--color-text-secondary); margin:0; line-height:1.5; }
.f label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
.f input { width:100%; padding:12px 14px; border:1px solid var(--color-border); border-radius:10px; background:#F7F7F7; font-size:15px; font-family:var(--font-family); }
.submit { height:48px; border:none; border-radius:10px; background:var(--color-primary); color:#fff; font-weight:600; font-size:16px; cursor:pointer; }
.back { text-align:center; }
.back a { color:var(--color-primary); font-weight:600; text-decoration:none; font-size:14px; }
@media(max-width:760px){ .split{grid-template-columns:1fr;} .illus{display:none;} }
</style>
</head>
<body>
<div class="mk-toolbar"><strong>MOCKUP</strong><span class="tag">auth</span><span>03 · Forgot password</span><a href="index.html">← index</a></div>
<div class="split">
    <aside class="illus">
        <div style="display:flex;align-items:center;gap:8px;"><div class="brand-logo" style="filter:brightness(0) invert(1)"></div><strong style="font-size:20px;">Llanqui</strong></div>
        <div style="margin-top:auto;"><h2>Recover access<br>to your account</h2><p>We'll send you a secure link to reset your password.</p></div>
    </aside>
    <section class="panel">
        <div class="logo"></div>
        <h1>Forgot your password?</h1>
        <p class="lead">Enter the email associated with your account and we'll send you instructions to reset it.</p>
        <div class="f"><label>Email</label><input type="email" placeholder="name@example.com"></div>
        <button class="submit">Send reset link</button>
        <p class="back"><a href="01-sign-in.html">← Back to sign in</a></p>
    </section>
</div>
</body>
</html>
