<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup — Google callback</title>
<link rel="stylesheet" href="_app.css">
<style>
.wrap { min-height:calc(100vh - 41px); display:grid; place-items:center; background:linear-gradient(180deg,#eef2f8,#e6eaf3); }
.box { text-align:center; display:flex; flex-direction:column; align-items:center; gap:16px; }
.spinner { width:48px; height:48px; border:4px solid var(--color-bg); border-top-color:var(--color-primary); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.box p { margin:0; font-size:16px; color:var(--color-text-secondary); font-weight:500; }
.box small { color:var(--color-text-muted); }
</style>
</head>
<body>
<div class="mk-toolbar"><strong>MOCKUP</strong><span class="tag">auth</span><span>04 · Google callback</span><a href="index.html">← index</a></div>
<div class="wrap">
    <div class="box">
        <div class="spinner"></div>
        <p>Authenticating with Google...</p>
        <small>Please don't close this window</small>
    </div>
</div>
</body>
</html>
